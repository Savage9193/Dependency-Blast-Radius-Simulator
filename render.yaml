services:
  - type: web
    name: dbrs-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build -w @dbrs/shared && npm run build -w @dbrs/backend
    startCommand: npm run db:migrate -w @dbrs/backend && npm run start -w @dbrs/backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: "3001"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "1000"
